    <!-- Apply the saved theme before first paint to prevent a dark flash for light-mode users.
         Must stay in sync with the 'siyahin-theme' key used in src/App.tsx -->
    <script>
      (function () {
        try {
          // If stored theme is 'light', set it on <html>
          if (localStorage.getItem('siyahin-theme') === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Elegant Decorative Background Pattern Watermarks Setup via CSS Variables -->
    <style>
      :root {
        --sadu: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="40" viewBox="0 0 60 40" fill="none"><path d="M0 20 L30 0 L60 20 L30 40 Z" stroke="%23c9a24b" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.35"/><circle cx="30" cy="20" r="3" fill="%23c9a24b" opacity="0.45"/></svg>');
      }

      /* Smooth in-page navigation, unless the visitor prefers reduced motion */
      html {
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }

      body {
        overflow-x: hidden;
      }

      /* Brass-on-ink text selection matching the identity */
      ::selection {
        background: #d4af37;
        color: #070503;
      }

      /* Custom brass scrollbar */
      html {
        scrollbar-color: #8a661f #0f0b07;
      }
      html.light {
        scrollbar-color: #b8892a #f4f0e6;
      }
      ::-webkit-scrollbar {
        width: 11px;
        height: 11px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0b07;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #a1802f, #66511b);
        border-radius: 8px;
        border: 2px solid #0f0b07;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #d4af37, #8a661f);
      }
      html.light ::-webkit-scrollbar-track {
        background: #f4f0e6;
      }
      html.light ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #a8842c, #7a5a14);
        border-color: #f4f0e6;
      }

      /* ——— Pre-mount splash screen (replaced automatically when React renders) ——— */
      .splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background: radial-gradient(ellipse at 50% 0%, #162435 0%, #0f0b07 48%, #070503 100%);
        color: #fcf8f0;
        z-index: 9999;
      }
      html.light .splash-screen {
        background: radial-gradient(ellipse at 50% 0%, #f4f0e6 0%, #fcfbf7 60%);
        color: #241a10;
      }
      .splash-emblem {
        position: relative;
        width: 108px;
        height: 108px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-emblem svg {
        width: 56px;
        height: 56px;
        filter: drop-shadow(0 0 14px rgba(201, 162, 75, 0.45));
      }
      .splash-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(201, 162, 75, 0.18);
        border-top-color: #d4af37;
        animation: splash-spin 1.1s linear infinite;
      }
      .splash-ring--outer {
        inset: -12px;
        border-width: 1px;
        border-color: rgba(201, 162, 75, 0.1);
        border-bottom-color: rgba(233, 209, 151, 0.55);
        animation-duration: 2.4s;
        animation-direction: reverse;
      }
      .splash-title {
        font-family: 'Aref Ruqaa', 'Amiri', serif;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #ebd481;
        text-shadow: 0 2px 18px rgba(201, 162, 75, 0.25);
      }
      html.light .splash-title {
        color: #b8892a;
        text-shadow: none;
      }
      .splash-sub {
        font-family: 'Reem Kufi', 'IBM Plex Sans Arabic', sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        color: #bba989;
        animation: splash-pulse 1.8s ease-in-out infinite;
      }
      html.light .splash-sub {
        color: #6e6350;
      }
      .splash-band {
        width: 120px;
        height: 22px;
        background-image: var(--sadu);
        background-repeat: repeat-x;
        background-size: 44px 30px;
        background-position: center;
        opacity: 0.55;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes splash-pulse {
        0%, 100% {
          opacity: 0.45;
        }
        50% {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-ring,
        .splash-sub {
          animation: none;
        }
      }

      .noscript-notice {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #070503;
        color: #fcf8f0;
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        text-align: center;
        line-height: 2;
      }
      .noscript-notice strong {
        color: #ebd481;
        font-family: 'Aref Ruqaa', 'Amiri', serif;
        display: block;
        font-size: 22px;
        margin-bottom: 8px;
      }
    </style>

    <!-- Fallback for splash screen if React fails to mount -->
    <script>
      (function () {
        try {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (!root || !root.querySelector('[data-app-ready="true"]')) {
              var notice = document.createElement('div');
              notice.style.cssText = 'position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;background:#070503;color:#fcf8f0;font-family:"IBM Plex Sans Arabic",sans-serif;text-align:center;line-height:2;';
              notice.innerHTML = '<div><strong style="color:#ebd481;font-family:"Aref Ruqaa","Amiri",serif;display:block;font-size:22px;margin-bottom:8px;">تعذر تحميل التطبيق</strong>يرجى تحديث الصفحة أو التأكد من اكتمال النشر على GitHub Pages.</div>';
              document.body.appendChild(notice);
            }
          }, 30000);
        } catch (e) {}
      })();
    </script>
