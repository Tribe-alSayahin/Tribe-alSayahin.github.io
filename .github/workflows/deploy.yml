# Build the Next.js app and deploy the dist/ output to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Triggered by Supabase webhook on new/updated/deleted posts
  repository_dispatch:
    types: [rebuild-news]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Accessibility check
        run: npm run test:a11y

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping search engines (sitemap + IndexNow)
        env:
          # INDEXNOW_KEY is public by design (stored in public/<key>.txt for verification).
          # Store it in GitHub Secrets → INDEXNOW_KEY to allow key rotation without editing this file.
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY || '6d3e7f1a9b2c4d8e5f0a6b3c7d1e2f4a' }}
        run: |
          SITEMAP="https://alsaihani.com/sitemap.xml"
          SITE="https://alsaihani.com"

          echo "→ Bing sitemap ping"
          curl -sf "https://www.bing.com/ping?sitemap=${SITEMAP}" -o /dev/null && echo "  ✓ Bing" || echo "  ✗ Bing (non-fatal)"

          echo "→ Yandex sitemap ping"
          curl -sf "https://yandex.com/ping?sitemap=${SITEMAP}" -o /dev/null && echo "  ✓ Yandex" || echo "  ✗ Yandex (non-fatal)"

          echo "→ IndexNow batch (all static URLs)"
          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"alsaihani.com\",
              \"key\": \"${INDEXNOW_KEY}\",
              \"keyLocation\": \"${SITE}/${INDEXNOW_KEY}.txt\",
              \"urlList\": [
                \"${SITE}/\",
                \"${SITE}/nasab/\",
                \"${SITE}/diyar/\",
                \"${SITE}/hawiya/\",
                \"${SITE}/tarikh/\",
                \"${SITE}/news/\"
              ]
            }" -o /dev/null && echo "  ✓ IndexNow batch" || echo "  ✗ IndexNow batch (non-fatal)"
        continue-on-error: true
