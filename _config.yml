# Jekyll Site Configuration
title: Tribe alSayahin
description: >-
  A digital archive and interactive platform for the Tribe alSayahin's 
  heritage, lineage, and cultural traditions.

# Build settings
source: ./
destination: ./_site
encoding: utf-8

# Collections and defaults
collections:
  poets:
    output: true
    permalink: /poets/:name

# Exclude files from being built
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - tsconfig.json
  - vite.config.ts
  - main.tsx
  - index.tsx
  - server.ts
  - "*.tsx"
  - "*.ts"
  - .env.example

# Theme
theme: jekyll-theme-primer

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-github-metadata

# GitHub Pages specific settings
github: [metadata]
